<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recall — AI study tool</title>
  <meta name="description" content="Turn topics, notes, or PDFs into flashcards and quizzes, then review with spaced repetition. Runs in your browser with your own API key." />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <!-- pdf.js is loaded on demand from app.js (dynamic import) for in-browser PDF text extraction -->
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">Recall</span>
      <span class="brand-sub">study with AI + spaced repetition</span>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-btn" data-view="home">Decks</button>
      <button class="nav-btn" data-view="create">New deck</button>
      <button class="nav-btn" data-view="settings" id="settings-btn" aria-label="Settings">Settings</button>
    </nav>
  </header>

  <main id="app">
    <!-- views are rendered here by app.js -->
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
